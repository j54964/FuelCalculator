<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>油耗計算</title>
<style>
  body { font-family: sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; }
  label { display: block; margin: 8px 0 4px; }
  input[type="number"] { width: 100%; box-sizing: border-box; padding: 6px; font-size: 1rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  td { padding: 8px; border: 1px solid #ccc; }
  td:first-child { width: 50%; background: #f5f5f5; }
  #price-info { margin-top: 24px; font-size: 0.9rem; color: #555; border-top: 1px solid #ddd; padding-top: 12px; }
  a { color: #0066cc; }
  .grade-select { display: flex; gap: 20px; margin-bottom: 16px; align-items: center; }
  .grade-select label { margin: 0; cursor: pointer; font-size: 1rem; }
</style>
</head>
<body>

<h2>無鉛汽油油耗計算</h2>

<div class="grade-select">
  <label><input type="radio" name="grade" value="92" checked> 92</label>
  <label><input type="radio" name="grade" value="95"> 95</label>
  <label><input type="radio" name="grade" value="98"> 98</label>
</div>

<label>車輛油耗 (km/L)
  <input type="number" id="eff" value="9" min="1" step="0.1">
</label>

<table>
  <tr>
    <td>可行駛里程 (km)</td>
    <td><input type="number" id="km" placeholder="輸入里程"></td>
  </tr>
  <tr>
    <td id="liter-label">92 汽油公升數 (L)</td>
    <td><input type="number" id="liter" placeholder="輸入公升數"></td>
  </tr>
  <tr>
    <td id="cost-label">92 汽油合計總價 (元)</td>
    <td><input type="number" id="cost" placeholder="輸入金額"></td>
  </tr>
</table>

<div id="price-info">載入油價中…</div>

<script>
const prices = { 92: 32.4, 95: 33.9, 98: 35.9 };

const eff = document.getElementById('eff');
const km = document.getElementById('km');
const liter = document.getElementById('liter');
const cost = document.getElementById('cost');

function grade() {
  return document.querySelector('input[name="grade"]:checked').value;
}

function price() {
  return prices[grade()];
}

function round(v) { return Math.round(v * 10) / 10; }

function calcFrom(changed) {
  const e = parseFloat(eff.value) || 9;
  if (changed === 'km') {
    const k = parseFloat(km.value);
    if (isNaN(k)) return;
    liter.value = round(k / e);
    cost.value = round(k / e * price());
  } else if (changed === 'liter') {
    const l = parseFloat(liter.value);
    if (isNaN(l)) return;
    km.value = round(l * e);
    cost.value = round(l * price());
  } else if (changed === 'cost') {
    const c = parseFloat(cost.value);
    if (isNaN(c)) return;
    liter.value = round(c / price());
    km.value = round(c / price() * e);
  }
}

function recalcAll() {
  if (km.value) calcFrom('km');
  else if (liter.value) calcFrom('liter');
  else if (cost.value) calcFrom('cost');
}

function updateLabels() {
  const g = grade();
  document.getElementById('liter-label').textContent = `${g} 汽油公升數 (L)`;
  document.getElementById('cost-label').textContent = `${g} 汽油合計總價 (元)`;
  updatePriceInfo();
  recalcAll();
}

function getWeekLabel() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}年${m}月${day}日`;
}

function updatePriceInfo() {
  const g = grade();
  document.getElementById('price-info').innerHTML =
    `${getWeekLabel()}當週 ${g} 汽油單價：每公升 <strong>${prices[g]}</strong> 元 ／ ` +
    `<a href="https://www.cpc.com.tw" target="_blank">中油官網</a>`;
}

km.addEventListener('input', () => calcFrom('km'));
liter.addEventListener('input', () => calcFrom('liter'));
cost.addEventListener('input', () => calcFrom('cost'));
eff.addEventListener('input', recalcAll);
document.querySelectorAll('input[name="grade"]').forEach(r => {
  r.addEventListener('change', updateLabels);
});

updatePriceInfo();
</script>

</body>
</html>
