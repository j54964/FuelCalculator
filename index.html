<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>油耗計算</title>
<style>
  body { font-family: sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; }
  label.eff { display: block; margin: 8px 0 4px; }
  input[type="number"] { width: 100%; box-sizing: border-box; padding: 6px; font-size: 1rem; }
  table.calc { width: 100%; border-collapse: collapse; margin-top: 16px; }
  table.calc td { padding: 8px; border: 1px solid #ccc; }
  table.calc td:first-child { width: 55%; background: #f5f5f5; }
  .price-section { margin-top: 28px; border-top: 2px solid #ddd; padding-top: 14px; }
  .price-section h3 { margin: 0 0 10px; font-size: 0.95rem; color: #444; }
  table.brands { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  table.brands th { background: #eee; padding: 6px 8px; text-align: center; border: 1px solid #ccc; }
  table.brands td { padding: 6px 8px; border: 1px solid #ccc; text-align: center; }
  table.brands td:first-child, table.brands td:nth-child(3) { text-align: left; }
  .selected-row td { background: #fffbe6; font-weight: bold; }
</style>
</head>
<body>

<h2>無鉛汽油油耗計算</h2>

<label class="eff">車輛油耗 (km/L)
  <input type="number" id="eff" value="9" min="1" step="0.1">
</label>

<table class="calc">
  <tr>
    <td>可行駛里程 (km)</td>
    <td><input type="number" id="km" placeholder="輸入里程"></td>
  </tr>
  <tr>
    <td id="liter-label">台塑 92 汽油公升數 (L)</td>
    <td><input type="number" id="liter" placeholder="輸入公升數"></td>
  </tr>
  <tr>
    <td id="cost-label">台塑 92 汽油合計總價 (元)</td>
    <td><input type="number" id="cost" placeholder="輸入金額"></td>
  </tr>
</table>

<div class="price-section">
  <h3 id="week-label"></h3>
  <table class="brands">
    <thead>
      <tr>
        <th colspan="2">中油</th>
        <th colspan="2">台塑</th>
      </tr>
    </thead>
    <tbody id="price-tbody"></tbody>
  </table>
</div>

<script>
const data = [
  { cpc_grade: '92', cpc_price: 30.4, fpcc_grade: '92',  fpcc_price: 30.4 },
  { cpc_grade: '95', cpc_price: 31.9, fpcc_grade: '95+', fpcc_price: 31.9 },
  { cpc_grade: '98', cpc_price: 33.9, fpcc_grade: '98',  fpcc_price: 33.9 },
];

let sel = { brand: 'fpcc', grade: '92' };

function round(v) { return Math.round(v * 10) / 10; }

function currentPrice() {
  const row = data.find(r =>
    sel.brand === 'cpc' ? r.cpc_grade === sel.grade : r.fpcc_grade === sel.grade
  );
  return sel.brand === 'cpc' ? row.cpc_price : row.fpcc_price;
}

function calcFrom(changed) {
  const e = parseFloat(document.getElementById('eff').value) || 9;
  const km = document.getElementById('km');
  const lt = document.getElementById('liter');
  const co = document.getElementById('cost');
  const p = currentPrice();
  if (changed === 'km') {
    const k = parseFloat(km.value); if (isNaN(k)) return;
    lt.value = round(k / e); co.value = round(k / e * p);
  } else if (changed === 'liter') {
    const l = parseFloat(lt.value); if (isNaN(l)) return;
    km.value = round(l * e); co.value = round(l * p);
  } else if (changed === 'cost') {
    const c = parseFloat(co.value); if (isNaN(c)) return;
    lt.value = round(c / p); km.value = round(c / p * e);
  }
}

function recalcAll() {
  const km = document.getElementById('km');
  const lt = document.getElementById('liter');
  const co = document.getElementById('cost');
  if (km.value) calcFrom('km');
  else if (lt.value) calcFrom('liter');
  else if (co.value) calcFrom('cost');
}

function updateLabels() {
  const n = `${sel.brand === 'cpc' ? '中油' : '台塑'} ${sel.grade}`;
  document.getElementById('liter-label').textContent = `${n} 汽油公升數 (L)`;
  document.getElementById('cost-label').textContent = `${n} 汽油合計總價 (元)`;
  recalcAll();
}

function highlightRows() {
  document.querySelectorAll('#price-tbody tr').forEach(tr => {
    const active = tr.dataset.brand === sel.brand && tr.dataset.grade === sel.grade;
    tr.classList.toggle('selected-row', active);
  });
}

function buildTable() {
  const tbody = document.getElementById('price-tbody');
  data.forEach(row => {
    const tr = document.createElement('tr');
    tr.dataset.brand = ''; tr.dataset.grade = '';
    const isCpcSel  = sel.brand === 'cpc'  && sel.grade === row.cpc_grade;
    const isFpccSel = sel.brand === 'fpcc' && sel.grade === row.fpcc_grade;
    tr.innerHTML = `
      <td><label><input type="radio" name="g" value="cpc|${row.cpc_grade}"${isCpcSel?' checked':''}> ${row.cpc_grade}</label></td>
      <td>${row.cpc_price}</td>
      <td><label><input type="radio" name="g" value="fpcc|${row.fpcc_grade}"${isFpccSel?' checked':''}> ${row.fpcc_grade}</label></td>
      <td>${row.fpcc_price}</td>
    `;
    tbody.appendChild(tr);
  });

  document.querySelectorAll('input[name="g"]').forEach(r => {
    r.addEventListener('change', () => {
      [sel.brand, sel.grade] = r.value.split('|');
      highlightRows();
      updateLabels();
    });
  });
}

function getWeekLabel() {
  const d = new Date();
  return `${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月${String(d.getDate()).padStart(2,'0')}日 當週油價（元/公升）`;
}

document.getElementById('week-label').textContent = getWeekLabel();
buildTable();
highlightRows();
updateLabels();

document.getElementById('eff').addEventListener('input', recalcAll);
document.getElementById('km').addEventListener('input', () => calcFrom('km'));
document.getElementById('liter').addEventListener('input', () => calcFrom('liter'));
document.getElementById('cost').addEventListener('input', () => calcFrom('cost'));
</script>

</body>
</html>
